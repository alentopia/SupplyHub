<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Supply Hub - Splash</title>
  
  <link rel="stylesheet" href="design-system.css" />
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "surface-variant": "#e1e3de",
                    "surface-container-highest": "#e1e3de",
                    "primary-container": "#84cc16",
                    "on-surface-variant": "#424936",
                    "secondary-container": "#fed01b",
                    "background": "#f8faf5",
                    "primary-fixed-dim": "#91db2a",
                    "surface-container-lowest": "#ffffff",
                    "surface": "#f8faf5",
                    "outline": "#727a64",
                    "primary": "#416900",
                    "on-background": "#191c1a",
                },
                "fontFamily": {
                    "sans": ["Plus Jakarta Sans", "sans-serif"]
                }
            }
        }
    }
  </script>
  <style>
    body {
      margin: 0;
      background: #f8faf5;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a2e00 0%, #2f4a00 40%, #1a2e00 100%);
      padding: 40px 16px;
    }

    .phone-frame {
      width: 412px;
      height: 917px;
      background: #f8faf5;
      border-radius: 48px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow:
        0 0 0 10px rgba(0,0,0,0.4),
        0 40px 80px rgba(0,0,0,0.6),
        inset 0 0 0 1px rgba(255,255,255,0.08);
      position: relative;
    }

    @media (max-width: 480px) {
      .app-wrapper { padding: 0; }
      .phone-frame {
        width: 100%;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }
    }
    
    /* Splash Screen Animations */
    .splash-logo-container {
      animation: float 3s ease-in-out infinite;
    }
    
    .splash-glow {
      animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.1); }
    }
    
    /* Auto-redirect to home */
    .fade-out {
      animation: fadeOut 0.5s ease-in-out forwards;
      animation-delay: 2.5s;
    }
    
    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>
  
  <script>
    // Simulate splash screen loading and redirect
    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        window.location.href = "onboarding.html";
      }, 3000);
    });
  </script>
</head>
<body class="bg-background text-on-background">

<div class="app-wrapper">
  <div class="phone-frame fade-out relative">
    
    <!-- Background Decorators -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <!-- Top Right Glow -->
      <div class="absolute top-[-100px] right-[-100px] w-[350px] h-[350px] rounded-full bg-primary-container/20 blur-[50px]"></div>
      
      <!-- Bottom Left Glow -->
      <div class="absolute bottom-[-150px] left-[-100px] w-[450px] h-[450px] rounded-full bg-secondary-container/10 blur-[60px]"></div>
    </div>
    
    <!-- Main Content -->
    <div class="w-full h-full flex flex-col items-center justify-center relative z-10 px-5">
      
      <!-- Logo & Text Section -->
      <div class="flex flex-col items-center justify-center splash-logo-container">
        
        <!-- Logo Image Container -->
        <div class="relative w-[180px] h-[160px] flex items-center justify-center mb-4">
          <!-- Logo Glow -->
          <div class="absolute inset-2 bg-[#acf847] rounded-full blur-[25px] opacity-40 splash-glow"></div>
          
          <!-- Logo Image -->
          <img src="logo.png" alt="SupplyHub Logo" class="relative z-10 w-full h-auto drop-shadow-md">
        </div>
        
        <!-- Brand Name -->
        <div class="font-extrabold text-[42px] leading-none tracking-[-1.5px] mt-2">
          <span class="text-[#1a1c1b]">Supply</span><span class="text-primary-container">Hub</span>
        </div>
        
      </div>
      
    </div>
    
  </div><!-- /phone-frame -->
</div><!-- /app-wrapper -->

</body>
</html>
