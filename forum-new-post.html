<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Post – FarmForum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #FAFAF4; }

    /* ── Phone wrapper ──────────────────────────── */
    .app-wrapper {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a2e00 0%, #2f4a00 40%, #1a2e00 100%);
      padding: 40px 0;
    }
    .phone-frame {
      width: 412px; height: 917px;
      background: #FAFAF4;
      border-radius: 48px; overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow:
        0 0 0 10px rgba(0,0,0,0.4),
        0 40px 80px rgba(0,0,0,0.6),
        inset 0 0 0 1px rgba(255,255,255,0.08);
      position: relative;
    }
    @media (max-width: 480px) {
      .app-wrapper { padding: 0; background: #FAFAF4; }
      .phone-frame { width: 100%; height: 100dvh; border-radius: 0; box-shadow: none; }
    }

    /* ── Header bar ─────────────────────────────── */
    .header {
      flex-shrink: 0;
      background: #FAFAF4;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      padding: 24px 16px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header__back {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border: none; background: none; cursor: pointer;
      color: #1a1a1a;
      text-decoration: none;
    }
    .header__title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700; font-size: 16px;
      color: #154212;
      flex: 1; margin-left: 8px;
    }
    .header__post-btn {
      background: #315200;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-weight: 600; font-size: 16px;
      border: none; border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
    }

    /* ── Scrollable content area ────────────────── */
    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .content-scroll::-webkit-scrollbar { display: none; }

    /* ── Media upload area ──────────────────────── */
    .media-upload {
      height: 128px;
      background: #eeeee9;
      border: 2px dashed #c2c9bb;
      border-radius: 12px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; cursor: pointer;
    }
    .media-upload span {
      color: #42493e; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 400;
    }

    /* ── Location field ─────────────────────────── */
    .location-field {
      display: flex; align-items: center; gap: 8px; padding: 0 4px;
    }
    .location-field span {
      color: #808080; font-family: 'Inter', sans-serif; font-size: 15.6px;
    }

    /* ── Title field ────────────────────────────── */
    .title-field input {
      width: 100%;
      background: #ffffff;
      border: 1.3px solid rgba(70,70,70,0.34);
      border-radius: 10.4px;
      padding: 10.4px 20.8px;
      font-family: 'Inter', sans-serif; font-size: 15.6px; color: #333;
      outline: none;
      box-shadow: 0px 1.3px 2.7px rgba(0,0,0,0.05);
    }
    .title-field input::placeholder { color: #808080; }

    /* ── Category selector ──────────────────────── */
    .category-section {
      display: flex; flex-direction: column; gap: 12px;
    }
    .category-section__header {
      display: flex; align-items: center; gap: 8px; padding: 0 4px;
    }
    .category-section__label {
      color: #42493e; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
    }
    .category-pills {
      display: flex; gap: 8px; overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px; margin-right: -16px; padding-right: 16px;
    }
    .category-pills::-webkit-scrollbar { display: none; }
    .pill {
      flex-shrink: 0;
      border-radius: 16px;
      padding: 8px 20px;
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .pill--active {
      background: #2d5a27; color: #ffffff; border: 1px solid #2d5a27; padding: 8px 16px;
    }
    .pill--outline {
      background: transparent; color: #315200; border: 1px solid #416900;
    }

    /* ── Description area ───────────────────────── */
    .description-section {
      display: flex; flex-direction: column;
      border: 1px solid rgba(194,201,187,0.3);
      border-radius: 16px;
      box-shadow: 0px 1px 2px 0px rgba(0,0,0,0.05);
      background: #ffffff;
      overflow: hidden;
      min-height: 280px;
    }
    .description-section textarea {
      flex: 1;
      width: 100%;
      border: 1.3px solid rgba(70,70,70,0.34);
      border-bottom: none;
      border-radius: 16px 16px 0 0;
      padding: 16px;
      font-family: 'Inter', sans-serif; font-size: 15.6px; color: #333;
      resize: none; outline: none;
    }
    .description-section textarea::placeholder { color: #808080; }
    
    .format-toolbar {
      background: #f4f4ee;
      border-top: 1px solid rgba(194,201,187,0.3);
      padding: 9px 12px 8px;
      display: flex; align-items: center; gap: 4px;
    }
    .toolbar-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer; color: #42493e;
      border-radius: 4px;
    }
    .toolbar-btn:hover { background: rgba(0,0,0,0.05); }
    .toolbar-separator {
      width: 1px; height: 24px; background: #c2c9bb; margin: 0 4px;
    }

  </style>
</head>
<body>

<div class="app-wrapper">
  <div class="phone-frame">

    <!-- Header bar -->
    <div class="header">
      <a href="forum.html" class="header__back" aria-label="Back to forum">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </a>
      <span class="header__title">New Post</span>
      <button class="header__post-btn">Post</button>
    </div>

    <!-- Scrollable body -->
    <div class="content-scroll">

      <!-- Media upload -->
      <div class="media-upload" role="button" tabindex="0">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#154212" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 4h-4L8 6H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-2"></path>
          <circle cx="12" cy="13" r="3"></circle>
          <line x1="20" y1="2" x2="20" y2="8"></line>
          <line x1="17" y1="5" x2="23" y2="5"></line>
        </svg>
        <span>Add Photo or Document</span>
      </div>

      <!-- Location field -->
      <div class="location-field" role="button" tabindex="0">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#808080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"></path>
          <circle cx="12" cy="10" r="3"></circle>
        </svg>
        <span>Add Location</span>
      </div>

      <!-- Title field -->
      <div class="title-field">
        <input type="text" placeholder="Add a Title..." aria-label="Post title" />
      </div>

      <!-- Category selector -->
      <div class="category-section">
        <div class="category-section__header">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#42493e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
            <line x1="7" y1="7" x2="7.01" y2="7"></line>
          </svg>
          <span class="category-section__label">Select Category</span>
        </div>
        <div class="category-pills" role="group" aria-label="Post categories">
          <button class="pill pill--active" aria-pressed="true">Agriculture</button>
          <button class="pill pill--outline" aria-pressed="false">Aquaculture</button>
          <button class="pill pill--outline" aria-pressed="false">Livestock</button>
          <button class="pill pill--outline" aria-pressed="false">Logistics</button>
          <button class="pill pill--outline" aria-pressed="false">Marketplace</button>
          <button class="pill pill--outline" aria-pressed="false">Custom Tag</button>
        </div>
      </div>

      <!-- Description area -->
      <div class="description-section">
        <textarea placeholder="Add Description.." aria-label="Post description"></textarea>
        <div class="format-toolbar" role="toolbar" aria-label="Text formatting">
          <!-- Bold -->
          <button class="toolbar-btn" aria-label="Bold">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
              <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
            </svg>
          </button>
          <!-- Italic -->
          <button class="toolbar-btn" aria-label="Italic">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="4" x2="10" y2="4"/>
              <line x1="14" y1="20" x2="5" y2="20"/>
              <line x1="15" y1="4" x2="9" y2="20"/>
            </svg>
          </button>
          <!-- Bullet list -->
          <button class="toolbar-btn" aria-label="Bulleted list">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="9" y1="6" x2="20" y2="6"/>
              <line x1="9" y1="12" x2="20" y2="12"/>
              <line x1="9" y1="18" x2="20" y2="18"/>
              <circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/>
              <circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/>
              <circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
          </button>
          
          <div class="toolbar-separator"></div>

          <!-- Link -->
          <button class="toolbar-btn" aria-label="Insert link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
          </button>
          <!-- Mention -->
          <button class="toolbar-btn" aria-label="Mention">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"></path>
            </svg>
          </button>
        </div>
      </div>

    </div><!-- /content-scroll -->

  </div><!-- /phone-frame -->
</div><!-- /app-wrapper -->

<script>
  /* ── Category pill toggle ─────────────────── */
  document.querySelectorAll('.category-pills .pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.category-pills .pill').forEach(p => {
        p.classList.remove('pill--active');
        p.classList.add('pill--outline');
        p.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('pill--active');
      btn.classList.remove('pill--outline');
      btn.setAttribute('aria-pressed', 'true');
    });
  });

  /* ── Auto-grow textareas ──────────────────── */
  document.querySelectorAll('textarea').forEach(ta => {
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    });
  });
</script>

</body>
</html>
