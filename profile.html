  <style>
    body {
      margin: 0;
      background: #f8faf5;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a2e00 0%, #2f4a00 40%, #1a2e00 100%);
      padding: 40px 16px;
    }

    .phone-frame {
      width: 412px;
      height: 917px;
      background: #f8faf5;
      border-radius: 48px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow:
        0 0 0 10px rgba(0,0,0,0.4),
        0 40px 80px rgba(0,0,0,0.6),
        inset 0 0 0 1px rgba(255,255,255,0.08);
      position: relative;
    }

    /* STATUS BAR */
    .status-bar {
      background: transparent;
      padding: 12px 24px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 50;
    }
    .status-bar__time { color: #1a1c1b; font-size: 14px; font-weight: 700; font-family: 'Plus Jakarta Sans', sans-serif; }
    .status-bar__icons { display: flex; align-items: center; gap: 6px; }

    /* SCROLLABLE CONTENT */
    .app-content {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      display: flex;
      flex-direction: column;
    }
    .app-content::-webkit-scrollbar { display: none; }

    /* BOTTOM NAV */
    .bottom-nav {
      background: #FAFAF4;
      border-top: 1px solid #C2C9BB;
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: 80px;
      padding-bottom: 8px; /* safe area */
      flex-shrink: 0;
      z-index: 50;
    }
    .bottom-nav__item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
    }
    .bottom-nav__icon { width: 24px; height: 24px; }
    .bottom-nav__label { font-size: 12px; font-weight: 600; color: #424936; }
    
    .bottom-nav__item.active .bottom-nav__icon * { stroke: #6f5900; }
    .bottom-nav__item.active .bottom-nav__icon circle { stroke: #6f5900; }
    .bottom-nav__item.active .bottom-nav__label { color: #6f5900; }

    @media (max-width: 480px) {
      .app-wrapper { padding: 0; }
      .phone-frame {
        width: 100%;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
