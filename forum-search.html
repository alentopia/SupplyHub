<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #FAFAF4;
    }

    /* ── App wrapper & phone frame ── */
    .app-wrapper {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a2e00 0%, #2f4a00 40%, #1a2e00 100%);
      padding: 40px 0;
    }
    .phone-frame {
      width: 412px; height: 917px;
      background: #FAFAF4;
      border-radius: 48px; overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow:
        0 0 0 10px rgba(0,0,0,0.4),
        0 40px 80px rgba(0,0,0,0.6),
        inset 0 0 0 1px rgba(255,255,255,0.08);
      position: relative;
    }
    @media (max-width: 480px) {
      .app-wrapper { padding: 0; background: #FAFAF4; }
      .phone-frame { width: 100%; height: 100dvh; border-radius: 0; box-shadow: none; }
    }

    /* ── Status bar ── */
    .status-bar {
      background: #154212;
      padding: 12px 24px 8px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .status-bar__time {
      color: white; font-size: 14px; font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .status-bar__icons { display: flex; align-items: center; gap: 6px; }

    /* ── Scrollable content area ── */
    .screen-content {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      background: #FAFAF4;
      /* hide scrollbar */
      scrollbar-width: none;
    }
    .screen-content::-webkit-scrollbar { display: none; }

    /* ── Search bar row ── */
    .search-header {
      background: #154212;
      padding: 12px 16px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .back-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: white;
      flex-shrink: 0;
      padding: 0;
      border-radius: 50%;
    }
    .back-btn:hover { background: rgba(255,255,255,0.1); }
    .back-btn svg { width: 22px; height: 22px; }

    .search-form {
      flex: 1;
      display: flex;
      align-items: center;
      position: relative;
    }
    .search-input {
      width: 100%;
      height: 40px;
      background: white;
      border: 2px solid #4a7c3f;
      border-radius: 999px;
      padding: 0 44px 0 16px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #1e2a1a;
      outline: none;
      box-shadow: 0 0 0 3px rgba(74,124,63,0.18);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input::placeholder { color: #9aa58d; }
    .search-input:focus {
      border-color: #315200;
      box-shadow: 0 0 0 3px rgba(49,82,0,0.22);
    }

    .filter-btn {
      position: absolute;
      right: 10px; top: 50%; transform: translateY(-50%);
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: #4a7c3f;
      padding: 0;
    }
    .filter-btn svg { width: 18px; height: 18px; }

    /* ── Main body ── */
    .search-body {
      flex: 1;
      padding: 24px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── Section headers ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.09em;
      color: #315200;
      text-transform: uppercase;
    }
    .clear-all-btn {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #ae8d00;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .clear-all-btn:hover { text-decoration: underline; }

    /* ── Recent search items ── */
    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .recent-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 4px;
      border-bottom: 1px solid rgba(193,202,176,0.45);
      cursor: pointer;
    }
    .recent-item:last-child { border-bottom: none; }
    .recent-item:hover { background: rgba(49,82,0,0.04); border-radius: 10px; }

    .recent-icon {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: #eef1e8;
      border-radius: 50%;
      flex-shrink: 0;
      color: #6b7c5e;
    }
    .recent-icon svg { width: 16px; height: 16px; }

    .recent-text {
      flex: 1;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #2a3322;
      line-height: 1.4;
    }

    .remove-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: #9aa58d;
      flex-shrink: 0;
      border-radius: 50%;
      padding: 0;
      font-size: 16px;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }
    .remove-btn:hover { background: #f0f0ea; color: #5a6652; }

    /* ── Trending pills ── */
    .trending-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 9px 17px;
      border: 1px solid #C2C9BB;
      border-radius: 9999px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #42493E;
      background: white;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .pill:hover {
      background: #f0f3ea;
      border-color: #a0aa96;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      flex-shrink: 0;
      background: white;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
      border-top: 1px solid rgba(193,202,176,0.30);
      border-top-left-radius: 32px;
      border-top-right-radius: 32px;
      display: flex; align-items: center; justify-content: space-around;
      padding: 8px 8px 12px;
      height: 74px;
    }
    .bottom-nav__item {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 4px 16px; border-radius: 9999px; gap: 2px;
      text-decoration: none; background: none; border: none; cursor: pointer;
    }
    .bottom-nav__item.active { background: #f1f5e6; }
    .bottom-nav__icon { width: 22px; height: 22px; }
    .bottom-nav__label {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700; font-size: 12px; color: #424936;
      padding-top: 2px; line-height: 1.33;
    }
    .bottom-nav__item.active .bottom-nav__label { color: #6f5900; }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div class="phone-frame">

      <!-- Status Bar -->
      <div class="status-bar">
        <span class="status-bar__time">9:41</span>
        <div class="status-bar__icons">
          <!-- Signal bars -->
          <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
            <rect x="0" y="7" width="3" height="5" rx="1" fill="white"/>
            <rect x="4.5" y="5" width="3" height="7" rx="1" fill="white"/>
            <rect x="9" y="2" width="3" height="10" rx="1" fill="white"/>
            <rect x="13.5" y="0" width="3" height="12" rx="1" fill="rgba(255,255,255,0.38)"/>
          </svg>
          <!-- Wi-Fi -->
          <svg width="16" height="12" viewBox="0 0 24 18" fill="none">
            <path d="M2.05 6.53A13.5 13.5 0 0 1 22 6.53" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <path d="M5.5 10.4A8.5 8.5 0 0 1 18.5 10.4" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <path d="M9.2 14.1A4 4 0 0 1 14.8 14.1" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="18" r="1.5" fill="white"/>
          </svg>
          <!-- Battery -->
          <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
            <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="rgba(255,255,255,0.35)"/>
            <rect x="1.5" y="1.5" width="16" height="9" rx="2.5" fill="white"/>
            <path d="M23 4v4a2 2 0 0 0 0-4z" fill="rgba(255,255,255,0.4)"/>
          </svg>
        </div>
      </div>

      <!-- Search Header -->
      <div class="search-header">
        <!-- Back button -->
        <a href="forum.html" class="back-btn" aria-label="Go back">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/>
            <path d="M12 19l-7-7 7-7"/>
          </svg>
        </a>

        <!-- Search form -->
        <form class="search-form" action="forum-results.html" method="get" onsubmit="handleSearch(event)">
          <input
            class="search-input"
            type="text"
            name="q"
            id="search-input"
            placeholder="Enter Search Term"
            autocomplete="off"
            autofocus
          />
          <button type="button" class="filter-btn" aria-label="Filter">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="4" y1="6" x2="20" y2="6"/>
              <line x1="4" y1="12" x2="14" y2="12"/>
              <line x1="4" y1="18" x2="10" y2="18"/>
              <circle cx="17" cy="12" r="3" fill="none"/>
              <circle cx="13" cy="6" r="3" fill="none"/>
              <circle cx="7" cy="18" r="3" fill="none"/>
            </svg>
          </button>
        </form>
      </div>

      <!-- Scrollable content -->
      <div class="screen-content">
        <div class="search-body">

          <!-- Recent Searches -->
          <section>
            <div class="section-header">
              <span class="section-title">Recent Searches</span>
              <button class="clear-all-btn" onclick="clearAll()">Clear All</button>
            </div>
            <div class="recent-list" id="recent-list">

              <!-- Item 1 -->
              <div class="recent-item" onclick="fillSearch('Organic Fertilizer Supplier - Jakarta')">
                <div class="recent-icon">
                  <!-- Clock / history icon -->
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="9"/>
                    <polyline points="12 7 12 12 15.5 14.5"/>
                  </svg>
                </div>
                <span class="recent-text">Organic Fertilizer Supplier - Jakarta</span>
                <button class="remove-btn" onclick="removeItem(event, this)" aria-label="Remove">&#x2715;</button>
              </div>

              <!-- Item 2 -->
              <div class="recent-item" onclick="fillSearch('Corn Futures Price Analysis')">
                <div class="recent-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="9"/>
                    <polyline points="12 7 12 12 15.5 14.5"/>
                  </svg>
                </div>
                <span class="recent-text">Corn Futures Price Analysis</span>
                <button class="remove-btn" onclick="removeItem(event, this)" aria-label="Remove">&#x2715;</button>
              </div>

              <!-- Item 3 -->
              <div class="recent-item" onclick="fillSearch('Is Palm Oil Sustainable?')">
                <div class="recent-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="9"/>
                    <polyline points="12 7 12 12 15.5 14.5"/>
                  </svg>
                </div>
                <span class="recent-text">Is Palm Oil Sustainable?</span>
                <button class="remove-btn" onclick="removeItem(event, this)" aria-label="Remove">&#x2715;</button>
              </div>

            </div>
          </section>

          <!-- Trending Now -->
          <section>
            <div class="section-header">
              <span class="section-title">Trending Now</span>
            </div>
            <div class="trending-pills">
              <button class="pill" onclick="fillSearch('#PestControl')">#PestControl</button>
              <button class="pill" onclick="fillSearch('#GlobalGrain')">#GlobalGrain</button>
              <button class="pill" onclick="fillSearch('#AgriTech')">#AgriTech</button>
              <button class="pill" onclick="fillSearch('#VerticalFarming')">#VerticalFarming</button>
              <button class="pill" onclick="fillSearch('#SoybeanExports')">#SoybeanExports</button>
            </div>
          </section>

        </div>
      </div>

      <!-- Bottom Nav -->
      <nav class="bottom-nav" id="bottom-nav">
        <a href="index.html" class="bottom-nav__item" id="nav-home">
          <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="#424936"/>
            <polyline points="9 22 9 12 15 12 15 22" stroke="#424936"/>
          </svg>
          <span class="bottom-nav__label" style="font-family:var(--font-display); font-weight:700;">Home</span>
        </a>
        <a href="marketplace.html" class="bottom-nav__item" id="nav-market">
          <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l1-5h16l1 5" stroke="#424936"/>
            <path d="M3 9a2 2 0 0 0 2 2 2 2 0 0 0 2-2 2 2 0 0 0 2 2 2 2 0 0 0 2-2 2 2 0 0 0 2 2 2 2 0 0 0 2-2 2 2 0 0 0 2 2v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9z" stroke="#424936"/>
            <rect x="9" y="14" width="6" height="5" rx="1" stroke="#424936"/>
          </svg>
          <span class="bottom-nav__label" style="font-family:var(--font-display); font-weight:700;">Market</span>
        </a>
        <a href="forum.html" class="bottom-nav__item active" id="nav-forum" aria-current="page">
          <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="#6f5900"/>
          </svg>
          <span class="bottom-nav__label" style="color:#6f5900; font-family:var(--font-display); font-weight:700;">Forum</span>
        </a>
        <button class="bottom-nav__item" id="nav-profile">
          <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="#424936" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span class="bottom-nav__label" style="font-family:var(--font-display); font-weight:700;">Profile</span>
        </button>
      </nav>

    </div><!-- /.phone-frame -->
  </div><!-- /.app-wrapper -->

  <script>
    // Autofocus the search input on load
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('search-input').focus();
    });

    // Fill search input from recent/trending
    function fillSearch(term) {
      const input = document.getElementById('search-input');
      input.value = term;
      input.focus();
    }

    // Remove a single recent-search item
    function removeItem(event, btn) {
      event.stopPropagation();
      const item = btn.closest('.recent-item');
      if (item) {
        item.style.transition = 'opacity 0.2s';
        item.style.opacity = '0';
        setTimeout(() => item.remove(), 200);
      }
    }

    // Clear all recent searches
    function clearAll() {
      const list = document.getElementById('recent-list');
      [...list.children].forEach(item => {
        item.style.transition = 'opacity 0.2s';
        item.style.opacity = '0';
      });
      setTimeout(() => { list.innerHTML = ''; }, 200);
    }

    // Handle search form submit → navigate to forum-results.html
    function handleSearch(event) {
      event.preventDefault();
      const q = document.getElementById('search-input').value.trim();
      if (q) {
        window.location.href = 'forum-results.html?q=' + encodeURIComponent(q);
      }
    }
  </script>
</body>
</html>
